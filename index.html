<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relator de Recibos</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }
        .card { 
            background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            padding: 25px; width: 92%; max-width: 450px; text-align: center; 
        }
        .btn-foto { 
            background-color: #007bff; color: white; padding: 20px; border-radius: 15px; 
            font-weight: bold; font-size: 18px; border: none; width: 100%; cursor: pointer;
        }
        #status { margin-top: 15px; font-weight: bold; color: #65676b; }
        #resultado { 
            background: #e7f3ff; color: #003d99; padding: 15px; border-radius: 10px; 
            font-size: 15px; border: 1px solid #c2e0ff; font-weight: bold; margin-top: 15px;
            text-align: left; white-space: pre-wrap; word-break: break-all;
        }
        .btn-copiar { 
            background-color: #28a745; color: white; padding: 15px; border-radius: 12px; 
            font-size: 17px; font-weight: bold; border: none; width: 100%; margin-top: 15px; cursor: pointer;
        }
        .loading { color: #ff9800; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .sucesso { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Relatório de Comprovante</h2>
    <button class="btn-foto" onclick="document.getElementById('camera').click()">
        📸 SELECIONAR COMPROVANTE
    </button>
    <input type="file" id="camera" accept="image/*" style="display:none">

    <div id="status"></div>
    <div id="areaResultado" style="display:none">
        <div id="resultado"></div>
        <button class="btn-copiar" onclick="copiarTexto()">📋 COPIAR TEXTO</button>
    </div>
</div>

<script>
    const input = document.getElementById('camera');
    const status = document.getElementById('status');
    const resultado = document.getElementById('resultado');
    const areaResultado = document.getElementById('areaResultado');

    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        status.innerHTML = "<span class='loading'>Lendo imagem...</span>";
        areaResultado.style.display = "none";

        Tesseract.recognize(file, 'por').then(({ data: { text } }) => {
            status.innerText = "";
            processarTexto(text);
        }).catch(() => {
            status.innerText = "Erro ao ler. Tente uma foto mais nítida.";
        });
    };

    function processarTexto(bruto) {
        // Limpeza básica para facilitar a busca
        const linhas = bruto.split('\n').map(l => l.trim()).filter(l => l.length > 2);
        const textoCorrido = linhas.join(' ');

        // 1. Busca de Valor (Melhorada para pegar números após R$, Total ou isolados com vírgula)
        const regexValor = /(?:R\$|VALOR|TOTAL|PAGO)\s*([\d.,]+)/i;
        const matchValor = textoCorrido.match(regexValor);
        let valor = matchValor ? "R$ " + matchValor[1] : "Valor não encontrado";

        // 2. Busca de Data - CORRIGIDO: executar uma única vez
        const regexData = /(\d{2}\/\d{2}\/\d{4})/;
        const matchData = textoCorrido.match(regexData);
        const data = matchData ? matchData[1] : "Data não encontrada";

        // 3. Lógica para Nomes (Busca por palavras-chave próximas) - CORRIGIDO: melhor tratamento
        let recebe = "Não identificado";
        let manda = "Não identificado";

        for (let i = 0; i < linhas.length; i++) {
            const linha = linhas[i].toUpperCase();
            
            // Tenta achar quem RECEBE (Favorecido, Destinatário, Para:)
            if (linha.includes("FAVORECIDO") || linha.includes("DESTINATÁRIO") || linha.includes("RECEBEDOR") || linha.includes("PARA")) {
                // Busca a próxima linha que não seja vazia
                for (let j = i + 1; j < linhas.length && j < i + 3; j++) {
                    if (linhas[j].trim().length > 2 && !linhas[j].match(/^\d/)) {
                        recebe = linhas[j];
                        break;
                    }
                }
                // Fallback: pega após os dois-pontos
                if (recebe === "Não identificado") {
                    const partes = linhas[i].split(':');
                    if (partes.length > 1) recebe = partes[1].trim();
                }
            }
            
            // Tenta achar quem MANDA (Pagador, Origem, De:)
            if (linha.includes("PAGADOR") || linha.includes("ORIGEM") || linha.includes("DE:") || linha.includes("NOME DO CLIENTE")) {
                // Busca a próxima linha que não seja vazia
                for (let j = i + 1; j < linhas.length && j < i + 3; j++) {
                    if (linhas[j].trim().length > 2 && !linhas[j].match(/^\d/)) {
                        manda = linhas[j];
                        break;
                    }
                }
                // Fallback: pega após os dois-pontos
                if (manda === "Não identificado") {
                    const partes = linhas[i].split(':');
                    if (partes.length > 1) manda = partes[1].trim();
                }
            }
        }

        // Limpeza final dos nomes (remover caracteres estranhos)
        const limpar = (t) => t.replace(/[:\-]/g, '').trim();

        const textoFinal = `${valor} | RECEBE: ${limpar(recebe)} | MANDA: ${limpar(manda)} | DATA: ${data}`;
        
        resultado.innerText = textoFinal;
        areaResultado.style.display = "block";
    }

    function copiarTexto() {
        navigator.clipboard.writeText(resultado.innerText).then(() => {
            const btn = event.target;
            const textoBkp = btn.innerText;
            btn.innerText = "✓ Copiado!";
            btn.style.backgroundColor = "#28a745";
            setTimeout(() => {
                btn.innerText = textoBkp;
                btn.style.backgroundColor = "#28a745";
            }, 2000);
        }).catch(() => {
            alert("Erro ao copiar. Tente novamente.");
        });
    }
</script>
</body>
</html>
