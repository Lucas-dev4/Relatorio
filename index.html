<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Recibos - OCR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/2.1.1/tesseract.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        #file-input {
            display: none;
        }

        .upload-label {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 120px;
            border: 2px dashed #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-label:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-label:active {
            transform: scale(0.98);
        }

        .upload-label svg {
            width: 40px;
            height: 40px;
            margin-right: 12px;
            color: #667eea;
        }

        .upload-text {
            color: #667eea;
            font-weight: 600;
            font-size: 16px;
        }

        .button-container {
            margin: 30px 0;
        }

        .btn-primary {
            width: 100%;
            padding: 18px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .output-section {
            margin-top: 30px;
            min-height: 100px;
        }

        .result-card {
            background: #f8f9ff;
            border-radius: 20px;
            padding: 25px;
            text-align: left;
            border-left: 5px solid #667eea;
        }

        .result-item {
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 18px;
            border-bottom: 1px solid #e0e0ff;
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .result-label {
            color: #667eea;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            color: #333;
            font-weight: 600;
            font-size: 16px;
            word-break: break-word;
            flex: 1;
            text-align: right;
            margin-left: 15px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #667eea;
            font-weight: 600;
            margin-top: 10px;
        }

        .error-message {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            font-size: 14px;
            border-left: 5px solid #d32f2f;
            display: none;
        }

        .success-icon {
            color: #4caf50;
            font-size: 24px;
            margin-right: 10px;
        }

        .file-name {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
                border-radius: 25px;
            }

            .header h1 {
                font-size: 24px;
            }

            .btn-primary {
                padding: 16px 30px;
                font-size: 16px;
            }

            .result-value {
                font-size: 14px;
            }

            .upload-label {
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Leitor de Recibos</h1>
            <p>Extraia informações automaticamente de suas imagens usando OCR</p>
        </div>

        <div class="upload-section">
            <div class="file-input-wrapper">
                <input type="file" id="file-input" accept="image/*">
                <label for="file-input" class="upload-label">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    <span class="upload-text">Clique para selecionar</span>
                </label>
                <div class="file-name" id="file-name"></div>
            </div>
        </div>

        <div class="button-container">
            <button class="btn-primary" id="process-btn" disabled>
                🚀 Processar Imagem
            </button>
        </div>

        <div class="error-message" id="error-message"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Processando sua imagem...</div>
        </div>

        <div class="output-section" id="output"></div>
    </div>

    <script>
        let selectedFile = null;

        // Elementos do DOM
        const fileInput = document.getElementById('file-input');
        const processBtn = document.getElementById('process-btn');
        const outputDiv = document.getElementById('output');
        const loadingDiv = document.getElementById('loading');
        const errorMessage = document.getElementById('error-message');
        const fileNameDiv = document.getElementById('file-name');

        // Evento ao selecionar arquivo
        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                // Validar tipo de arquivo
                if (!file.type.startsWith('image/')) {
                    showError('Por favor, selecione uma imagem válida');
                    fileInput.value = '';
                    processBtn.disabled = true;
                    selectedFile = null;
                    return;
                }

                // Validar tamanho de arquivo (máx 5MB)
                if (file.size > 5 * 1024 * 1024) {
                    showError('O arquivo é muito grande. Máximo permitido: 5MB');
                    fileInput.value = '';
                    processBtn.disabled = true;
                    selectedFile = null;
                    return;
                }

                selectedFile = file;
                processBtn.disabled = false;
                errorMessage.style.display = 'none';
                fileNameDiv.textContent = '✓ Arquivo selecionado: ' + file.name;
                fileNameDiv.style.display = 'block';
                outputDiv.innerHTML = '';
            }
        });

        // Evento ao clicar no botão de processar
        processBtn.addEventListener('click', function() {
            if (!selectedFile) {
                showError('Por favor, selecione uma imagem primeiro');
                return;
            }

            processarImagem(selectedFile);
        });

        // Função para processar a imagem
        function processarImagem(file) {
            // Mostrar carregamento
            loadingDiv.style.display = 'block';
            outputDiv.innerHTML = '';
            errorMessage.style.display = 'none';
            processBtn.disabled = true;

            Tesseract.recognize(
                file,
                'por', // Português
                { logger: info => console.log(info) }
            ).then(({ data: { text } }) => {
                // Processar o texto extraído
                const resultado = extrairInformacoes(text);
                exibirResultado(resultado);
                loadingDiv.style.display = 'none';
                processBtn.disabled = false;
            }).catch(error => {
                console.error('Erro ao processar imagem:', error);
                showError('Erro ao processar a imagem. Tente novamente.');
                loadingDiv.style.display = 'none';
                processBtn.disabled = false;
            });
        }

        // Função para extrair informações do texto
        function extrairInformacoes(texto) {
            const linhas = texto.split('\n');
            let resultado = {
                remetente: 'Não encontrado',
                destinatario: 'Não encontrado',
                valor: 'Não encontrado',
                data: 'Não encontrado',
                descricao: 'Não encontrado'
            };

            linhas.forEach(linha => {
                const linhaLower = linha.toLowerCase().trim();

                if (linhaLower.includes('remetente') || linhaLower.includes('sender') || linhaLower.includes('de:')) {
                    resultado.remetente = linha.split(':')[1]?.trim() || resultado.remetente;
                } 
                else if (linhaLower.includes('destinatario') || linhaLower.includes('receiver') || linhaLower.includes('para:')) {
                    resultado.destinatario = linha.split(':')[1]?.trim() || resultado.destinatario;
                } 
                else if (linhaLower.includes('valor') || linhaLower.includes('value') || linhaLower.includes('r$') || linhaLower.includes('total')) {
                    resultado.valor = linha.split(':')[1]?.trim() || resultado.valor;
                } 
                else if (linhaLower.includes('data') || linhaLower.includes('date') || linhaLower.includes('dia')) {
                    resultado.data = linha.split(':')[1]?.trim() || resultado.data;
                } 
                else if (linhaLower.includes('descricao') || linhaLower.includes('description') || linhaLower.includes('assunto')) {
                    resultado.descricao = linha.split(':')[1]?.trim() || resultado.descricao;
                }
            });

            return resultado;
        }

        // Função para exibir resultado
        function exibirResultado(resultado) {
            const resultadoHTML = `
                <div class="result-card">
                    <div class="result-item">
                        <span class="result-label">👤 Remetente</span>
                        <span class="result-value">${resultado.remetente}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">📨 Destinatário</span>
                        <span class="result-value">${resultado.destinatario}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">💰 Valor</span>
                        <span class="result-value">${resultado.valor}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">📅 Data</span>
                        <span class="result-value">${resultado.data}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">📝 Descrição</span>
                        <span class="result-value">${resultado.descricao}</span>
                    </div>
                </div>
            `;
            outputDiv.innerHTML = resultadoHTML;
        }

        // Função para mostrar erro
        function showError(message) {
            errorMessage.textContent = '⚠️ ' + message;
            errorMessage.style.display = 'block';
            loadingDiv.style.display = 'none';
            outputDiv.innerHTML = '';
        }

        // Impedir comportamento padrão de drag and drop
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                const event = new Event('change', { bubbles: true });
                fileInput.dispatchEvent(event);
            }
        });
    </script>
</body>
</html>
