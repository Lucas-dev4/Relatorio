<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt OCR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/2.1.1/tesseract.min.js"></script>
</head>
<body>
    <h1>OCR Receipt Reader</h1>
    <input type="file" id="file-input" accept="image/*">
    <div id="output"></div>

    <script>
        document.getElementById('file-input').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                Tesseract.recognize(
                    file,
                    'eng',
                    { logger: info => console.log(info) }
                ).then(({ data: { text } }) => {
                    // Extracting sender, receiver, value, and date from the text
                    const lines = text.split('\n');
                    let sender = '', receiver = '', value = '', date = '';
                    lines.forEach(line => {
                        if (line.toLowerCase().includes('sender:')) {
                            sender = line.split(':')[1].trim();
                        } else if (line.toLowerCase().includes('receiver:')) {
                            receiver = line.split(':')[1].trim();
                        } else if (line.toLowerCase().includes('value:')) {
                            value = line.split(':')[1].trim();
                        } else if (line.toLowerCase().includes('date:')) {
                            date = line.split(':')[1].trim();
                        }
                    });
                    document.getElementById('output').innerHTML = `<p>Sender: ${sender}</p><p>Receiver: ${receiver}</p><p>Value: ${value}</p><p>Date: ${date}</p>`;
                });
            }
        });
    </script>
</body>
</html>
