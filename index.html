<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Date Extraction Improvement</title>\n</head>\n<body>\n    <h1>Date Extraction Improvements</h1>\n    <script>\n        function extractDates(text) {\n            const regex = /\b(\d{1,2}[\/-]\d{1,2}[\/-]\d{2,4}|\d{4}[\/-]\d{1,2}[\/-]\d{1,2})\b/g;\n            return text.match(regex);\n        }\n\n        // Example usage with a Brazilian bank statement\n        const statement = "A conta foi debitada no dia 24/03/2026 e creditada no dia 25-03-2026.";\n        console.log(extractDates(statement)); // Output: [ '24/03/2026', '25-03-2026' ]\n    <\/script>\n</body>\n</html>\n
