<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Comprovante</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 24px;
        }

        /* Botão Azul Gigante */
        .btn-foto {
            background-color: #007bff;
            color: white;
            padding: 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border: none;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-foto:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .btn-foto:active {
            background-color: #003d82;
            transform: translateY(1px);
        }

        .btn-subtexto {
            font-size: 13px;
            font-weight: normal;
            opacity: 0.9;
            display: block;
            margin-top: 8px;
        }

        /* Área de Status */
        #status {
            font-size: 15px;
            color: #65676b;
            margin-top: 20px;
            min-height: 20px;
            font-weight: bold;
            text-align: center;
        }

        /* Animação de carregamento */
        .carregando {
            color: #ff9800 !important;
            animation: pisca 1s infinite;
        }

        @keyframes pisca {
            50% { opacity: 0.5; }
        }

        /* Área de Resultado */
        #areaResultado {
            display: none;
            margin-top: 20px;
            text-align: left;
        }

        #rotuloResultado {
            font-size: 14px;
            color: #65676b;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        #resultado {
            background: #e7f3ff;
            color: #0052cc;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            border: 1px solid #c2e0ff;
            font-weight: bold;
            word-wrap: break-word;
            min-height: 60px;
            display: flex;
            align-items: center;
        }

        /* Botão Verde de Copiar */
        .btn-copiar {
            background-color: #28a745;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .btn-copiar:hover {
            background-color: #1e7e34;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .btn-copiar:active {
            background-color: #155724;
            transform: translateY(1px);
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>📸 Enviar Comprovante</h2>

        <button class="btn-foto" onclick="document.getElementById('camera').click()">
            SELECIONAR IMAGEM
            <span class="btn-subtexto">(Tirar foto ou escolher da galeria)</span>
        </button>

        <input type="file" id="camera" accept="image/*">

        <div id="status"></div>

        <div id="areaResultado">
            <span id="rotuloResultado">Texto para o WhatsApp:</span>
            <div id="resultado"></div>

            <button id="btnCopiar" class="btn-copiar" onclick="copiarTexto()">
                📋 COPIAR TEXTO
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v2"></script>
    <script>
        const input = document.getElementById('camera');
        const status = document.getElementById('status');
        const resultado = document.getElementById('resultado');
        const areaResultado = document.getElementById('areaResultado');

        input.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Mostra status de carregamento
            status.innerText = "🔍 Lendo comprovante... aguarde.";
            status.classList.add('carregando');
            areaResultado.style.display = "none";
            resultado.innerText = "";

            // Inicia a leitura da imagem com OCR
            Tesseract.recognize(file, 'por', {
                logger: m => console.log(m)
            }).then(({ data: { text } }) => {
                status.innerText = "✅ Comprovante lido com sucesso!";
                status.classList.remove('carregando');
                status.style.color = "#28a745";
                formatarEExibir(text);
            }).catch((err) => {
                console.error(err);
                status.innerText = "❌ Erro ao ler a imagem. Tente outra foto.";
                status.classList.remove('carregando');
                status.style.color = "red";
            });
        };

        function formatarEExibir(bruto) {
            // Limpa espaços extras e quebras de linha
            const textoLimpo = bruto.replace(/\s+/g, ' ').trim();

            // 1. Tenta pegar o VALOR (procura R$, Valor, Total ou números com vírgula)
            const regexValor = /(?:R\$|VALOR|TOTAL|PAGO)\s?([\d.,]+)/i;
            const matchValor = textoLimpo.match(regexValor);
            const valor = matchValor ? "R$ " + matchValor[1] : "[VALOR]";

            // 2. Tenta pegar a DATA (formato dd/mm/aaaa ou dd.mm.aaaa)
            const regexData = /(\d{2}[\/\.]\d{2}[\/\.]\d{4})/;
            const matchData = textoLimpo.match(regexData);
            const data = matchData ? matchData[1].replace(/\./g, '/') : "[DATA]";

            // 3. Monta o texto final
            const textoFinal = `${valor} | RECEBE: [Confirmar Nome] | MANDA: Francivaldo Alves | DATA: ${data}`;

            // Exibe o resultado e o botão copiar
            resultado.innerText = textoFinal;
            areaResultado.style.display = "block";
        }

        function copiarTexto() {
            const texto = resultado.innerText;

            // Tenta usar a API moderna de cópia
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(texto).then(() => {
                    alert("✅ Copiado! Agora é só colar no WhatsApp do Francivaldo.");
                }).catch(err => {
                    console.error('Erro ao copiar', err);
                    alert("❌ Erro ao copiar. Selecione e copie manualmente.");
                });
            } else {
                // Fallback para navegadores antigos
                alert("Seu navegador não suporta cópia automática. Copie o texto manualmente.");
            }
        }
    </script>
</body>
</html>
